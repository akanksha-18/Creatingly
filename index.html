<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HTML Tag Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">

  <header>
    <div class="eyebrow">// module v1.0</div>
    <h1>HTML Tag<br/>Analyzer</h1>
  </header>

  <!-- URL Bar -->
  <div class="url-bar">
    <input class="url-input" id="urlInput" type="text"
      value="https://api.allorigins.win/raw?url=https://example.com"
      placeholder="Enter proxy URL…" spellcheck="false"/>
    <button class="fetch-btn" id="fetchBtn" onclick="App.fetch()">Analyze</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card" id="statUnique">
      <span class="stat-label">Unique Tags</span>
      <span class="stat-value" id="valUnique">—</span>
    </div>
    <div class="stat-card" id="statTotal">
      <span class="stat-label">Total Elements</span>
      <span class="stat-value" id="valTotal">—</span>
    </div>
    <div class="stat-card" id="statTop">
      <span class="stat-label">Top Tag</span>
      <span class="stat-value" id="valTop" style="font-size:1.1rem;padding-top:0.2rem">—</span>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="searchInput" type="text"
      placeholder="Filter tags…" autocomplete="off" oninput="App.filter(this.value)"/>
  </div>

  <!-- Result count -->
  <div class="result-count" id="resultCount" style="display:none">
    <div class="count-chip">Showing <span id="countVal">0</span> results</div>
  </div>

  <!-- Virtual List -->
  <div class="scroller-wrap">
    <div class="list-header">
      <span>#</span><span>Tag</span><span style="text-align:right">Count</span><span>Frequency</span>
    </div>
    <div class="virtual-viewport" id="viewport">
      <div class="status-zone" id="emptyState">
        <div class="status-icon">⬡</div>
        <div class="status-text">Enter a URL above and click <strong>Analyze</strong> to inspect its HTML tags.</div>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
